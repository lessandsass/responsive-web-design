<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <style>
            .box { padding: 50px;  }
            
            .box-1 { background-image: linear-gradient(to bottom right, red, blue); }
            
            .box-2 { background-image: linear-gradient(0deg, green, yellow)}
            
            .box-3 { background-image: linear-gradient(90deg, orange 75%, teal) }
            
            .box-4 { background-image: linear-gradient(90deg, deeppink,
                                                              deeppink 10%,
                                                              teal 10%,
                                                              teal 20%,
                                                              deeppink 20%,
                                                              deeppink 30%,
                                                              teal 30%,
                                                              teal 40%,
                                                              deeppink 40%); 
            }
            
            .box-5 { background-image: radial-gradient(red, blue);
                     width: 300px;
                     height: 300px; }
                
        </style>
        
        <title>CSS Gradients</title>
    </head>
    <body>

        <div class="box box-1"></div>
        <div class="box box-2"></div>
        <div class="box box-3"></div>
        <div class="box box-4"></div>
        <div class="box box-5"></div>
            
        
    </body>
</html>
